<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost at Sea · Grecian Gusts</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .lost { max-width: 420px; padding: 40px 24px; }
    .lost-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .lost h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; color: var(--navy); margin-bottom: 8px; }
    .lost p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    .home-btn {
      display: inline-block; padding: 12px 28px;
      background: var(--navy); color: white;
      border-radius: 8px; text-decoration: none;
      font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .home-btn:hover { background: var(--navy-mid); }
  </style>
</head>
<body>
  <div class="lost">
    <span class="lost-icon">🧭</span>
    <h1>Lost at Sea</h1>
    <p>This page doesn't exist. The captain would like a word with whoever gave you these coordinates.</p>
    <a href="/" class="home-btn">⛵ Back to the Boat</a>
  </div>
